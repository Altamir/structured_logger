name: CLEF Viewer images

on:
  workflow_call:
  push:
    branches:
      - master
      - main
    paths:
      - 'apps/clef_viewer/**'
      - '.github/workflows/clef-viewer-images.yml'
  workflow_dispatch:

concurrency:
  group: clef-viewer-images
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/altamir

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: clef-viewer-server
            dockerfile: apps/clef_viewer/server/Dockerfile
          - name: clef-viewer-webapp
            dockerfile: apps/clef_viewer/ui/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            CLEF_VIEWER_VERSION=${{ github.sha }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max