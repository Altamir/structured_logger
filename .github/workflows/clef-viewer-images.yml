name: CLEF Viewer images

on:
  workflow_call:
    inputs:
      is_pr:
        description: 'Whether this is a PR build'
        required: false
        default: 'false'
        type: string
      pr_number:
        description: 'PR number if applicable'
        required: false
        default: ''
        type: string
  workflow_dispatch:

concurrency:
  group: clef-viewer-images
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/altamir

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: clef-viewer-server
            dockerfile: apps/clef_viewer/server/Dockerfile
          - name: clef-viewer-webapp
            dockerfile: apps/clef_viewer/ui/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          if [[ "${{ inputs.is_pr }}" == "true" ]]; then
            echo "tags=${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.run_number }}-DEV-PR" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.run_number }},${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest,${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            CLEF_VIEWER_VERSION=${{ github.sha }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max