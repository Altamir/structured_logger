name: Deploy documentation

on:
  workflow_call:
    inputs:
      is_pr:
        description: 'Whether this is a PR preview deployment'
        required: false
        default: 'false'
        type: string
      pr_number:
        description: 'PR number (if applicable)'
        required: false
        default: ''
        type: string
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Sync doc and blog content
        run: bash website/scripts/sync-content.sh

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Determine deployment target
        id: deploy
        run: |
          if [[ "${{ inputs.is_pr }}" == "true" ]]; then
            echo "project=structured-logger" >> $GITHUB_OUTPUT
            echo "branch=pr-${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "project=structured-logger" >> $GITHUB_OUTPUT
            echo "branch=master" >> $GITHUB_OUTPUT
          fi

      - name: Ensure Cloudflare Pages project exists
        if: inputs.is_pr != 'true'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create structured-logger --production-branch=master

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/build --project-name=${{ steps.deploy.outputs.project }} --branch=${{ steps.deploy.outputs.branch }} --commit-dirty=true