name: Release (DEV + Stable)

# Triggers when a PR is merged (closed + merged).
# - Merged PR into develop → DEV pre-release (vX.Y.Z-dev.N, pre-release pub packages, DEV images/docs)
# - Merged PR into master → stable release (graduate or final vX.Y.Z, full publish, :latest)
#
# stable-release pushes version bumps via an auto-opened PR (master is protected; no bypass needed).

on:
  pull_request:
    types: [closed]

concurrency:
  group: release-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write
  deployments: write

jobs:
  dev-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      release_sha: ${{ steps.sha.outputs.sha }}

    steps:
      - name: Checkout (merge commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach to base branch for melos
        run: git checkout -B ${{ github.event.pull_request.base.ref }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter (for Flutter packages in the monorepo)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get root dependencies
        run: dart pub get

      - name: Activate Melos
        run: dart pub global activate melos --version 8.0.0

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run CI checks (must pass before release)
        run: melos run ci

      - name: Clean working tree before versioning
        run: |
          git checkout -- .
          git clean -fd

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version packages as DEV pre-release
        run: melos version --yes --prerelease --preid=DEV --no-git-tag-version

      - name: Create v{{version}} tags
        run: bash scripts/create_v_tags.sh

      - name: Push version bumps and tags
        run: |
          git push origin "HEAD:${{ github.event.pull_request.base.ref }}" --follow-tags
          git push --tags

      - name: Create GitHub Releases (as pre-release)
        run: |
          TAGS=$(git tag --points-at HEAD | grep '^v' || true)
          for TAG in $TAGS; do
            echo "Creating pre-release for $TAG"
            gh release create "$TAG" \
              --generate-notes \
              --prerelease \
              --title "$TAG"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture versioned commit sha (for image/docs build at the released commit)
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  dev-images:
    needs: dev-release
    if: needs.dev-release.result == 'success'
    uses: ./.github/workflows/clef-viewer-images.yml
    with:
      is_pr: 'false'
      is_dev: 'true'
      checkout_ref: ${{ needs.dev-release.outputs.release_sha }}
    secrets: inherit

  dev-docs:
    needs: dev-release
    if: needs.dev-release.result == 'success'
    uses: ./.github/workflows/deploy-docs.yml
    with:
      is_pr: 'false'
      is_dev: 'true'
      checkout_ref: ${{ needs.dev-release.outputs.release_sha }}
    secrets: inherit

  stable-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      release_sha: ${{ steps.sha.outputs.sha }}

    steps:
      - name: Checkout (merge commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach to base branch for melos
        run: git checkout -B ${{ github.event.pull_request.base.ref }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter (for Flutter packages in the monorepo)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get root dependencies
        run: dart pub get

      - name: Activate Melos
        run: dart pub global activate melos --version 8.0.0

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run CI checks (must pass before release)
        run: melos run ci

      - name: Clean working tree before versioning
        run: |
          git checkout -- .
          git clean -fd

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Graduate / create stable release version
        run: |
          if melos version --yes --graduate --no-git-tag-version 2>/dev/null; then
            echo "Graduated pre-release to stable"
          else
            echo "Graduate not applicable or no pre; falling back to conventional stable versioning"
            melos version --yes --no-git-tag-version
          fi

      - name: Create v{{version}} tags
        run: bash scripts/create_v_tags.sh

      - name: Push version bump branch, tags, and open PR to master
        id: version_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: chore/release-${{ github.run_id }}
        run: |
          set -euo pipefail
          git push origin "HEAD:${RELEASE_BRANCH}"
          git push origin --tags

          PR_URL=$(gh pr create \
            --base master \
            --head "${RELEASE_BRANCH}" \
            --title "chore(release): version bump from workflow" \
            --body "Automated stable version bump after merging PR #${{ github.event.pull_request.number }}.

          Merge this PR to sync \`master\` pubspec versions. Tags and pub.dev publish already run from this commit.")

          echo "Opened version bump PR: ${PR_URL}"
          echo "version_pr_url=${PR_URL}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Releases (stable)
        run: |
          TAGS=$(git tag --points-at HEAD | grep '^v' || true)
          for TAG in $TAGS; do
            echo "Creating stable release for $TAG"
            gh release create "$TAG" \
              --generate-notes \
              --title "$TAG"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture versioned commit sha
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  stable-images:
    needs: stable-release
    if: needs.stable-release.result == 'success'
    uses: ./.github/workflows/clef-viewer-images.yml
    with:
      is_pr: 'false'
      is_dev: 'false'
      checkout_ref: ${{ needs.stable-release.outputs.release_sha }}
    secrets: inherit

  stable-docs:
    needs: stable-release
    if: needs.stable-release.result == 'success'
    uses: ./.github/workflows/deploy-docs.yml
    with:
      is_pr: 'false'
      is_dev: 'false'
      checkout_ref: ${{ needs.stable-release.outputs.release_sha }}
    secrets: inherit