name: CI

on:
  pull_request:
    branches: [ develop, master ]
  push:
    branches: [ develop, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write     # needed for calling clef-viewer-images reusable workflow
  deployments: write  # needed for calling deploy-docs reusable workflow

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # accommodates cold melos bootstrap + analyze + tests (NFR)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter (for UI tests only)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get root dependencies
        run: dart pub get

      - name: Activate Melos
        run: dart pub global activate melos --version 8.0.0

      - name: Bootstrap workspace
        run: melos bootstrap
        # Produces single root pubspec.lock; respects categories and resolution

      - name: Analyze + Test (Dart + Flutter)
        run: melos run ci
        # Defined in root pubspec melos: section as:
        # analyze && analyze:flutter && test:dart && test:flutter

  # Run image builds after tests pass (on both PR and push).
  # On PR: tag with <run_number>-DEV-PR (preview)
  # On push to develop: tag with <run>-DEV + sha-DEV (no :latest)
  # On push to master: tag with <run>, :latest and :sha
  # latest is ONLY updated from master.
  build-images:
    needs: test
    if: needs.test.result == 'success'
    uses: ./.github/workflows/clef-viewer-images.yml
    with:
      is_pr: ${{ github.event_name == 'pull_request' }}
      pr_number: ${{ github.event.pull_request.number || '' }}
      is_dev: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
    secrets: inherit

  deploy-docs:
    needs: test
    if: needs.test.result == 'success'
    uses: ./.github/workflows/deploy-docs.yml
    with:
      is_pr: ${{ github.event_name == 'pull_request' }}
      pr_number: ${{ github.event.pull_request.number || '' }}
      is_dev: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
    secrets: inherit
