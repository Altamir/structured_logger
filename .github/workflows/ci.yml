name: CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # accommodates cold melos bootstrap + analyze + tests (NFR)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter (for UI tests only)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap
        # Produces single root pubspec.lock; respects categories and resolution

      - name: Analyze + Test (Dart + Flutter)
        run: melos run ci
        # Defined in root pubspec melos: section as:
        # analyze && analyze:flutter && test:dart && test:flutter
