name: Publish to pub.dev

# pub.dev OIDC only allows publish from:
#   - push of a git tag (automated releases from ci.yml)
#   - workflow_dispatch (manual)
# See: https://dart.dev/tools/pub/automated-publishing
#
# Tag pattern on pub.dev (both packages): v{{version}}

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package(s) to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - structured_logger
          - structured_logger_dio_interceptor
          - all
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter (for Flutter packages in the monorepo)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get root dependencies
        run: dart pub get

      - name: Activate Melos
        run: dart pub global activate melos --version 8.0.0

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run CI checks
        run: melos run ci

      - name: Clean working tree before versioning
        run: |
          git checkout -- .
          git clean -fd

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version packages
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            if [ "${{ inputs.package }}" = "all" ]; then
              melos version --yes --prerelease --no-git-tag-version
            else
              melos version --yes --prerelease --no-git-tag-version --scope=${{ inputs.package }}
            fi
          else
            if [ "${{ inputs.package }}" = "all" ]; then
              melos version \
                --yes \
                --no-git-tag-version \
                --manual-version "structured_logger:${{ inputs.bump }}" \
                --manual-version "structured_logger_dio_interceptor:${{ inputs.bump }}"
            else
              melos version \
                --yes \
                --no-git-tag-version \
                --manual-version "${{ inputs.package }}:${{ inputs.bump }}"
            fi
          fi

      - name: Create v{{version}} tags
        run: bash scripts/create_v_tags.sh

      - name: Publish to pub.dev (core first)
        run: |
          if [ "${{ inputs.package }}" = "all" ] || [ "${{ inputs.package }}" = "structured_logger" ]; then
            dart pub publish --directory packages/structured_logger --force
          fi
          if [ "${{ inputs.package }}" = "all" ] || [ "${{ inputs.package }}" = "structured_logger_dio_interceptor" ]; then
            dart pub publish --directory packages/structured_logger_dio_interceptor --force
          fi

      - name: Push version bumps and tags
        run: |
          git push --follow-tags
          git push --tags

      - name: Create GitHub Releases
        if: success()
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          for TAG in $(git tag --points-at HEAD | grep '^v'); do
            echo "Creating release for $TAG"
            gh release create "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG \
              --title "$TAG"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  resolve-package:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      working_directory: ${{ steps.resolve.outputs.working_directory }}
      package_name: ${{ steps.resolve.outputs.package_name }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Resolve package from tag version
        id: resolve
        run: |
          VER="${GITHUB_REF_NAME#v}"
          for dir in packages/structured_logger packages/structured_logger_dio_interceptor; do
            PKG_VER=$(grep '^version:' "$dir/pubspec.yaml" | awk '{print $2}')
            if [ "$PKG_VER" = "$VER" ]; then
              PKG_NAME=$(basename "$dir")
              echo "working_directory=$dir" >> $GITHUB_OUTPUT
              echo "package_name=$PKG_NAME" >> $GITHUB_OUTPUT
              echo "Publishing $dir at version $VER"
              exit 0
            fi
          done
          echo "No package matches tag version $VER" >&2
          exit 1

  wait-for-core:
    needs: resolve-package
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.resolve-package.outputs.package_name == 'structured_logger_dio_interceptor'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Wait for structured_logger on pub.dev
        run: |
          set -euo pipefail
          CORE_VER=$(grep 'structured_logger:' packages/structured_logger_dio_interceptor/pubspec.yaml \
            | head -1 | sed -E 's/.*structured_logger: *\^?([^ #]+).*/\1/')
          echo "Waiting for structured_logger $CORE_VER on pub.dev..."
          for i in $(seq 1 30); do
            if curl -sf "https://pub.dev/api/packages/structured_logger" \
              | grep -q "\"version\":\"${CORE_VER}\""; then
              echo "structured_logger $CORE_VER is available"
              exit 0
            fi
            echo "Attempt $i/30: not yet available, sleeping 10s..."
            sleep 10
          done
          echo "structured_logger $CORE_VER not found on pub.dev after 5 minutes" >&2
          exit 1

  publish:
    needs: [resolve-package, wait-for-core]
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.resolve-package.result == 'success' &&
      (needs.wait-for-core.result == 'success' || needs.wait-for-core.result == 'skipped')
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: ${{ needs.resolve-package.outputs.working_directory }}