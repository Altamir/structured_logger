name: Publish to pub.dev

# Official setup for pub.dev OIDC Trusted Publishing.
# See: https://dart.dev/tools/pub/automated-publishing
#
# IMPORTANT for pub.dev "Automated publishing" settings (per package):
#   Recommended Tag pattern (matches Melos monorepo tags):
#     structured_logger-v{{version}}
#     (or structured_logger_dio_interceptor-v{{version}} for the interceptor)
#
#   Alternative supported (we also create plain tags):
#     v{{version}}
#
# The automation (manual dispatch + branch approval flow in release.yml) creates:
# - The Melos package-prefixed tags (e.g. structured_logger-v1.2.3-DEV.1)
# - Additional plain v<ver> tags (e.g. v1.2.3-DEV.1) for compatibility
#
# Workflow uses the official reusable:
# uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
#
# OIDC via id-token: write (no long-lived secret needed).
# Custom dispatch kept for monorepo (select package + bump via UI).
#
# Automated flow (new):
# - PR approved → develop : uses --prerelease --preid=DEV → pre-release packages + GH pre-release
# - PR approved → master  : uses --graduate (or conventional) → stable packages + GH release
# Tags pushed by the release process trigger the jobs below.

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package(s) to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - structured_logger
          - structured_logger_dio_interceptor
          - all
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

  # Also support the official tag-triggered flow
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'structured_logger-v[0-9]+.[0-9]+.[0-9]+*'
      - '*-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  id-token: write

jobs:
  # Job for manual dispatch: does versioning with Melos and pushes the tag
  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter (for Flutter packages in the monorepo)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get root dependencies
        run: dart pub get

      - name: Activate Melos
        run: dart pub global activate melos --version 8.0.0

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run CI checks
        run: melos run ci

      - name: Clean working tree before versioning
        # Revert any lockfile or artifact changes from bootstrap/CI so melos version sees a clean tree
        run: |
          git checkout -- .
          git clean -fd

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version packages
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            # For prereleases we use conventional commits path + --prerelease
            # (manual-version cannot be combined with --prerelease)
            if [ "${{ inputs.package }}" = "all" ]; then
              melos version --yes --prerelease
            else
              melos version --yes --prerelease --scope=${{ inputs.package }}
            fi
          else
            if [ "${{ inputs.package }}" = "all" ]; then
              melos version \
                --yes \
                --manual-version "structured_logger:${{ inputs.bump }}" \
                --manual-version "structured_logger_dio_interceptor:${{ inputs.bump }}"
            else
              melos version \
                --yes \
                --manual-version "${{ inputs.package }}:${{ inputs.bump }}"
            fi
          fi

      - name: Push version bumps and tags
        run: |
          git push --follow-tags

      - name: Create additional plain v{{version}} tags (pub.dev v{{version}} compatibility)
        # Creates e.g. v1.2.3-DEV.1 alongside structured_logger-v1.2.3-DEV.1
        # This lets users configure either pattern in pub.dev Automated publishing.
        # Guarded by the publish jobs below to avoid cross-package publish attempts.
        run: |
          for TAG in $(git tag --points-at HEAD); do
            if [[ "$TAG" == *-v* ]]; then
              VER="${TAG##*-v}"
              echo "Creating compatibility plain tag: v${VER}"
              git tag "v${VER}" || true
            fi
          done
          git push --tags

      - name: Create GitHub Releases
        if: success()
        run: |
          TAGS=$(git tag --points-at HEAD)
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          for TAG in $TAGS; do
            echo "Creating release for $TAG"
            gh release create "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG \
              --title "$TAG"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Official publish jobs using the recommended reusable workflow
  # Triggered by the tag push from the release job (or manual tag push)
  #
  # We accept both:
  #   - structured_logger-vX.Y.Z... (Melos default)
  #   - vX.Y.Z... (plain, for users who configured pub.dev with v{{version}})
  # A guard step ensures we only invoke the reusable when the tag name matches
  # the version in THIS package's pubspec (prevents cross-package attempts and
  # the "ref not allowed / expected tag ..." error on pub.dev).
  publish-structured-logger:
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/structured_logger-v') || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute package version
        id: ver
        run: |
          VER=$(awk '/^version:/ {print $2; exit}' packages/structured_logger/pubspec.yaml | tr -d '\r')
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "plain_tag=v$VER"

      - name: Guard - tag must match this package version
        id: guard
        run: |
          REF="${{ github.ref }}"
          EXPECTED="refs/tags/v${{ steps.ver.outputs.ver }}"
          if [[ "$REF" == refs/tags/structured_logger-v* || "$REF" == "$EXPECTED" ]]; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "Tag $REF matches structured_logger version ${{ steps.ver.outputs.ver }} → will publish"
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "Skipping publish-structured-logger (tag $REF does not match version ${{ steps.ver.outputs.ver }})"
          fi

      - name: Publish structured_logger (only on matching tag)
        if: steps.guard.outputs.match == 'true'
        uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
        with:
          working-directory: packages/structured_logger

  publish-dio-interceptor:
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/structured_logger_dio_interceptor-v') || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute package version
        id: ver
        run: |
          VER=$(awk '/^version:/ {print $2; exit}' packages/structured_logger_dio_interceptor/pubspec.yaml | tr -d '\r')
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "plain_tag=v$VER"

      - name: Guard - tag must match this package version
        id: guard
        run: |
          REF="${{ github.ref }}"
          EXPECTED="refs/tags/v${{ steps.ver.outputs.ver }}"
          if [[ "$REF" == refs/tags/structured_logger_dio_interceptor-v* || "$REF" == "$EXPECTED" ]]; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "Tag $REF matches dio_interceptor version ${{ steps.ver.outputs.ver }} → will publish"
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "Skipping publish-dio-interceptor (tag $REF does not match version ${{ steps.ver.outputs.ver }})"
          fi

      - name: Publish dio-interceptor (only on matching tag)
        if: steps.guard.outputs.match == 'true'
        uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
        with:
          working-directory: packages/structured_logger_dio_interceptor
