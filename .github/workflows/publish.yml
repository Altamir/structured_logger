name: Publish to pub.dev

# Manual releases only. Automated publishing runs inline in ci.yml (prerelease-release / stable-release).
# See: https://dart.dev/tools/pub/automated-publishing

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package(s) to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - structured_logger
          - structured_logger_dio_interceptor
          - all
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter (for Flutter packages in the monorepo)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get root dependencies
        run: dart pub get

      - name: Activate Melos
        run: dart pub global activate melos --version 8.0.0

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run CI checks
        run: melos run ci

      - name: Clean working tree before versioning
        run: |
          git checkout -- .
          git clean -fd

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version packages
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            if [ "${{ inputs.package }}" = "all" ]; then
              melos version --yes --prerelease --no-git-tag-version
            else
              melos version --yes --prerelease --no-git-tag-version --scope=${{ inputs.package }}
            fi
          else
            if [ "${{ inputs.package }}" = "all" ]; then
              melos version \
                --yes \
                --no-git-tag-version \
                --manual-version "structured_logger:${{ inputs.bump }}" \
                --manual-version "structured_logger_dio_interceptor:${{ inputs.bump }}"
            else
              melos version \
                --yes \
                --no-git-tag-version \
                --manual-version "${{ inputs.package }}:${{ inputs.bump }}"
            fi
          fi

      - name: Create v{{version}} tags
        run: bash scripts/create_v_tags.sh

      - name: Publish to pub.dev (core first)
        run: |
          if [ "${{ inputs.package }}" = "all" ] || [ "${{ inputs.package }}" = "structured_logger" ]; then
            dart pub publish --directory packages/structured_logger --force
          fi
          if [ "${{ inputs.package }}" = "all" ] || [ "${{ inputs.package }}" = "structured_logger_dio_interceptor" ]; then
            dart pub publish --directory packages/structured_logger_dio_interceptor --force
          fi

      - name: Push version bumps and tags
        run: |
          git push --follow-tags
          git push --tags

      - name: Create GitHub Releases
        if: success()
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          for TAG in $(git tag --points-at HEAD | grep '^v'); do
            echo "Creating release for $TAG"
            gh release create "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG \
              --title "$TAG"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}