name: Publish to pub.dev

# Official setup for pub.dev OIDC Trusted Publishing.
# See: https://dart.dev/tools/pub/automated-publishing
#
# No pub.dev Admin (per package):
# - Tag pattern: structured_logger-v{{version}} (or *-v{{version}})
# - Enable workflow_dispatch events (and optionally push events)
#
# Workflow uses the official reusable:
# uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
#
# OIDC via id-token: write (no long-lived secret needed).
# Custom dispatch kept for monorepo (select package + bump via UI).

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package(s) to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - structured_logger
          - structured_logger_dio_interceptor
          - all
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

  # Also support the official tag-triggered flow
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'structured_logger-v[0-9]+.[0-9]+.[0-9]+*'
      - '*-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  id-token: write

jobs:
  # Job for manual dispatch: does versioning with Melos and pushes the tag
  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter (for Flutter packages in the monorepo)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get root dependencies
        run: dart pub get

      - name: Activate Melos
        run: dart pub global activate melos --version 8.0.0

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run CI checks
        run: melos run ci

      - name: Clean working tree before versioning
        # Revert any lockfile or artifact changes from bootstrap/CI so melos version sees a clean tree
        run: |
          git checkout -- .
          git clean -fd

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version packages
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            # For prereleases we use conventional commits path + --prerelease
            # (manual-version cannot be combined with --prerelease)
            if [ "${{ inputs.package }}" = "all" ]; then
              melos version --yes --prerelease
            else
              melos version --yes --prerelease --scope=${{ inputs.package }}
            fi
          else
            if [ "${{ inputs.package }}" = "all" ]; then
              melos version \
                --yes \
                --manual-version "structured_logger:${{ inputs.bump }}" \
                --manual-version "structured_logger_dio_interceptor:${{ inputs.bump }}"
            else
              melos version \
                --yes \
                --manual-version "${{ inputs.package }}:${{ inputs.bump }}"
            fi
          fi

      - name: Push version bumps and tags
        run: |
          git push --follow-tags

      - name: Create GitHub Releases
        if: success()
        run: |
          TAGS=$(git tag --points-at HEAD)
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          for TAG in $TAGS; do
            echo "Creating release for $TAG"
            gh release create "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG \
              --title "$TAG"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Official publish jobs using the recommended reusable workflow
  # Triggered by the tag push from the release job (or manual tag push)
  publish-structured-logger:
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/structured_logger-v') || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/structured_logger

  publish-dio-interceptor:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/structured_logger_dio_interceptor-v')
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/structured_logger_dio_interceptor
