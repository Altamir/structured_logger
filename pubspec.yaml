name: structured_logger_workspace
publish_to: none
description: Workspace for structured_logger Dart-pure monorepo
version: 0.0.0  # meta only

environment:
  sdk: ^3.6.0   # pub workspaces minimum; local 3.38.x

workspace:
  # Explicit list (instead of packages/* glob) for Dart < 3.11 compatibility.
  # Design shows glob example; globs require Dart >=3.11. Melos categories still use globs.
  - packages/structured_logger
  - packages/structured_logger_dio_interceptor
  - apps/clef_viewer/server
  - apps/clef_viewer/ui

dev_dependencies:
  melos: ^8.0.0

melos:
  repository: https://github.com/Altamir/structured_logger

  categories:
    dart:
      - packages/**
      - apps/**/server
    flutter:
      - apps/**/ui

  scripts:
    analyze:
      run: melos exec --fail-fast --category=dart -- dart analyze --fatal-infos .
      description: Analyze all Dart packages
    analyze:flutter:
      run: melos exec --fail-fast --category=flutter -- flutter analyze --fatal-infos .
      description: Flutter analyze for UI
    test:dart:
      run: melos exec --fail-fast --category=dart -- dart test
      description: Run tests for Dart-only packages (core + interceptor + server)
    test:flutter:
      run: melos exec --fail-fast --category=flutter -- flutter test
      description: Run Flutter tests for UI
    ci:
      run: melos run analyze && melos run analyze:flutter && melos run test:dart && melos run test:flutter
      description: Full CI pipeline
 